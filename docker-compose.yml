services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coordinator
      POSTGRES_USER: coordinator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coordinator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coordinator"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-before-deployment}
      DJANGO_DEBUG: "false"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DATABASE_URL: postgresql://coordinator:${POSTGRES_PASSWORD:-coordinator}@db:5432/coordinator
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
