services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coordinator
      POSTGRES_USER: coordinator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coordinator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coordinator"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-before-deployment}
      DJANGO_DEBUG: "false"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DATABASE_URL: postgresql://coordinator:${POSTGRES_PASSWORD:-coordinator}@db:5432/coordinator
      REDIS_URL: redis://redis:6379/0
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-host.docker.internal}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-ReliefGrid <noreply@davefrassoni.com>}
      FEATURE_REQUEST_EMAIL: ${FEATURE_REQUEST_EMAIL:-david.frassoni@gmail.com}
      VENEZUELA_FEED_AUTHORIZATION_HEADER: ${VENEZUELA_FEED_AUTHORIZATION_HEADER:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - python
      - manage.py
      - sync_feeds
      - --watch
      - --interval
      - ${FEED_INTERVAL_SECONDS:-900}
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-before-deployment}
      DJANGO_DEBUG: "false"
      DATABASE_URL: postgresql://coordinator:${POSTGRES_PASSWORD:-coordinator}@db:5432/coordinator
      REDIS_URL: redis://redis:6379/0
      VENEZUELA_FEED_AUTHORIZATION_HEADER: ${VENEZUELA_FEED_AUTHORIZATION_HEADER:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
